<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <filter id="kraft-paper">
    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" seed="2" stitchTiles="stitch" result="noise"/>
    <feDiffuseLighting in="noise" lighting-color="#D9C9A8" surfaceScale="1.5">
      <feDistantLight azimuth="45" elevation="55"/>
    </feDiffuseLighting>
  </filter>
  <rect width="100%" height="100%" filter="url(#kraft-paper)"/>
</svg>
