<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <filter id="paperGrain" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="4" seed="3" stitchTiles="stitch" result="grain"/>
    <feDiffuseLighting in="grain" lighting-color="#F4EFE6" surfaceScale="1.2">
      <feDistantLight azimuth="135" elevation="50"/>
    </feDiffuseLighting>
  </filter>
  <rect width="400" height="400" fill="#F4EFE6"/>
  <rect width="400" height="400" filter="url(#paperGrain)" opacity="0.05"/>
</svg>
