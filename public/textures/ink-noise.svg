<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <filter id="ink-noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="5" stitchTiles="stitch" result="noise"/>
    <feColorMatrix in="noise" type="saturate" values="0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#ink-noise)" opacity="0.04"/>
</svg>
